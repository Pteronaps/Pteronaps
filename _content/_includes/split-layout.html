<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="shortcut icon" type="image/png" href="/assets/pteroicon.png" />
    <title>{{ title | default: "Pteronaps" }}</title>
    <meta property="title" content="Pteronaps" />
    <meta property="type" content="website" />
    <meta property="url" content="https://pteronaps.com/" />
    <meta property="image" content="/assets/pterobanner.png" />
    <meta name="description" content="The official Charadex for the Pteronaps closed species!">

    <meta name="robots" content="noai, noimageai">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" type="text/css" href="/styles/charadex.css">
    <link rel="stylesheet" type="text/css" href="/styles/pteronaps.css">
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400|Comfortaa:500" rel="stylesheet">
</head>

<body class="split-body d-flex flex-column min-vh-100">
    {% include "split-header.html" %}

    <!-- Page body -->
    <div class="split-body-wrap flex-fill d-flex flex-column">
        <div class="split-outer-row flex-fill d-flex align-items-start">
            <!-- Left column -->
            <aside class="split-left-col flex-shrink-0 d-flex flex-column">
                <!-- Featured chara -->
                <div class="featured-box w-100 position-relative overflow-hidden">
                    {% if featuredImage %}
                    <img src="{{ featuredImage }}" alt="{{ featuredAlt | default: 'Featured character' }}">
                    {% else %}
                    <img src="/assets/pterobanner.png" alt="">
                    {% endif %}
                </div>

                <!-- Sign-style links -->
                <ul class="sign-list list-unstyled d-flex flex-column m-0">
                    <li><a class="sign-btn d-flex align-items-center w-100 text-uppercase" href="/masterlist/">Masterlist</a></li>
                    <li><a class="sign-btn d-flex align-items-center w-100 text-uppercase" href="/prompts/">Prompts</a></li>
                    <li><a class="sign-btn d-flex align-items-center w-100 text-uppercase" href="/items/">Items</a></li>
                    <li><a class="sign-btn d-flex align-items-center w-100 text-uppercase" href="/staff/">Staff</a></li>
                </ul>
            </aside>


            <!-- Right column -->
            <div class="split-right-col flex-fill d-flex flex-column">
                <!-- Header strip -->
                <div class="header-strip w-100 d-flex align-items-center justify-content-between flex-shrink-0">
                    <span class="species-name">{{ speciesName | default: "Pteronaps" }}</span>
                </div>

                <!-- Main content -->
                <main class="main-block w-100 flex-fill">
                    {{ content }}
                </main>

                <!-- Credits -->
                <footer class="credits-strip w-100 d-flex align-items-center justify-content-between flex-wrap flex-shrink-0">
                    <span class="credits-text">Species & art (c) kikos, Locke, polarsv. Site powered by Charadex.</span>
                    <nav class="credits-links d-flex" aria-label="Footer links">
                        <a href="/terms/">Terms</a>
                        <a href="/faq/">FAQ</a>
                        <a href="https://toyhou.se/~messages/create/kikos">Contact</a>
                    </nav>
                </footer>
            </div>
        </div>
    </div>


    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.js" integrity="sha256-H+K7U5CnXl1h5ywQfKtSj8PCmoN9aaq30gDh27Xc0jk=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>

    {% if pageScript %}
    <script src="https://cdnjs.cloudflare.com/ajax/libs/list.js/2.3.0/list.min.js" crossorigin="anonymous"></script>
    <script src="/styles/config.js"></script>
    <script src="/styles/charadex.js"></script>
    <script>{{ pageScript }}</script>
    {% endif %}
</body>
</html>
