<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="shortcut icon" type="image/png" href="/assets/pteroicon.png" />
    <title>{{ title | default: "Pteronaps Closed Species" }}</title>
    <meta property="title" content="Pteronaps" />
    <meta property="type" content="website" />
    <meta property="url" content="https://pteronaps.com/" />
    <meta property="image" content="/assets/pterobanner.png" />
    <meta name="description" content="The official Charadex for the Pteronaps closed species!">

    <meta name="robots" content="noai, noimageai">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ekko-lightbox@5.3.0/dist/ekko-lightbox.css" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="/styles/charadex.css">
    <link rel="stylesheet" type="text/css" href="/styles/pteronaps.css">
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400|Comfortaa:500" rel="stylesheet">
</head>

<body class="split-body d-flex flex-column min-vh-100">
    {% include "header.html" %}

    <div class="sidebar-backdrop" id="sidebarBackdrop" hidden></div>

    <!-- Page body -->
    <div class="split-body-wrap container-fluid flex-fill p-3 p-md-4">
        <div class="split-outer-row d-flex flex-column flex-lg-row align-items-stretch">
            <!-- Sidebar (offcanvas below lg) -->
            <aside class="split-left-col flex-shrink-0 d-flex flex-column" id="splitSidebar" tabindex="-1" aria-label="Page sidebar">
                <button type="button" class="sidebar-close d-lg-none" aria-label="Close sidebar">
                    <i class="fa-solid fa-xmark"></i>
                </button>
                <div class="featured-box w-100 position-relative overflow-hidden">
                    {% if featuredImage %}
                    <img src="{{ featuredImage }}" alt="{{ featuredAlt | default: 'Featured character' }}">
                    {% else %}
                    <img src="/assets/pterobanner.png" alt="">
                    {% endif %}
                </div>
                <ul class="sign-list list-unstyled d-flex flex-column m-0">
                    <li><a class="sign-btn d-flex align-items-center w-100 text-uppercase" href="/species/">About & Traits</a></li>
                    <li><a class="sign-btn d-flex align-items-center w-100 text-uppercase" href="/prompts/">Prompts</a></li>
                    <li><a class="sign-btn d-flex align-items-center w-100 text-uppercase" href="/items/">Items</a></li>
                    <li><a class="sign-btn d-flex align-items-center w-100 text-uppercase" href="/staff/">Staff</a></li>
                </ul>
            </aside>

            <!-- Main column -->
            <div class="split-right-col flex-fill d-flex flex-column">
                <div class="header-strip w-100 d-flex flex-column flex-sm-row align-items-sm-center justify-content-between flex-shrink-0">
                    <div class="d-flex align-items-center">
                        <button type="button" class="sidebar-toggle d-lg-none" aria-controls="splitSidebar" aria-expanded="false" aria-label="Toggle sidebar">
                            <i class="fa-solid fa-bars-staggered"></i>
                        </button>
                        <span class="species-name">{{ title | default: "Pteronaps" }}</span>
                    </div>
                </div>

                <main class="main-block w-100 flex-fill">
                    {{ content }}
                </main>

                {% include "footer.html" %}
            </div>
        </div>
    </div>

    <button id="myBtn" title="Go to top"><i class="fa-solid fa-arrow-up"></i></button>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.js" integrity="sha256-H+K7U5CnXl1h5ywQfKtSj8PCmoN9aaq30gDh27Xc0jk=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/ekko-lightbox@5.3.0/dist/ekko-lightbox.min.js" crossorigin="anonymous"></script>
    <script>
        $(document).on('click', '[data-toggle="lightbox"]', function (event) {
            event.preventDefault();
            $(this).ekkoLightbox({ alwaysShowClose: true });
        });
    </script>

    {% if pageScript %}
    <script src="https://cdnjs.cloudflare.com/ajax/libs/list.js/2.3.0/list.min.js" crossorigin="anonymous"></script>
    <script src="/styles/config.js"></script>
    <script src="/styles/charadex.js"></script>
    <script>{{ pageScript }}</script>
    {% endif %}
    <script src="/styles/pteronaps.js"></script>
</body>
</html>
